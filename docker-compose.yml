services:
  mongo:
    image: mongo:7
    container_name: gemchat-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gemchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    env_file:
      - ./BACKEND/.env
    container_name: gemchat-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/gemchat
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CLIENT_URL: http://localhost:5173
      TRUST_PROXY: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: gemchat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      # The frontend runs in the browser, so it must call the host-exposed backend URL.
      VITE_API_URL: http://localhost:4000

volumes:
  mongo_data:
  redis_data:
